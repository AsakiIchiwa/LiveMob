            for (int j = 0; j < n - i - 1; j++) {
                if (arr[j] > arr[j + 1]) {

                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;

const KW=new Set(['public','private','protected','class','interface','extends','implements','static','void','int','String','boolean','double','float','long','char','byte','short','new','return','if','else','for','while','do','switch','case','break','continue','try','catch','finally','throw','throws','import','package','null','true','false','this','super','final','abstract','synchronized','enum','instanceof','var','default','record']);
function hl(code){
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const ps=[
    [/^\/\/[^\n]*/,'cmt'],[/^\/\*[\s\S]*?\*\//,'cmt'],
    [/^"(?:[^"\\]|\\.)*"/,'str'],[/^'(?:[^'\\]|\\.)*'/,'str'],
    [/^@[a-zA-Z]+/,'ann'],
    [/^\d+(?:\.\d+)?[fdlL]?/,'num'],
    [/^[a-zA-Z_$][a-zA-Z0-9_$]*/,'word'],
    [/^[\s\S]/,null],
  ];
  let r='',rem=code;
  while(rem.length){
    for(const[re,tp]of ps){
      const m=rem.match(re);
      if(!m)continue;
      const t=m[0]; rem=rem.slice(t.length);
      if(tp==='word'){
        const isKw=KW.has(t);
        const isTy=/^[A-Z]/.test(t);
        const isMeth=!isKw&&!isTy&&rem.trimStart()[0]==='(';
        const cl=isKw?'kw':isTy?'typ':isMeth?'mth':null;
        r+=cl?`<span class="${cl}">${e(t)}</span>`:e(t);
      } else if(tp){r+=`<span class="${tp}">${e(t)}</span>`}
      else r+=e(t);
      break;
    }
  }
  return r;
}

  return d[n]||null;

// ── CODE SCREEN ───────────────────────────────────────────────
function CodeScreen({ac,editorSize,consoleLayout}){
  const[tabs,setTabs]=useState(['Main.java','Calculator.java','BubbleSort.java']);
  const[activeTab,setActiveTab]=useState('Main.java');
  const[codes,setCodes]=useState(CODES);
  const[running,setRunning]=useState(false);
  const[output,setOutput]=useState(null);
  const[showCons,setShowCons]=useState(true);
  const[cTab,setCTab]=useState('output');
  const[showDrw,setShowDrw]=useState(false);
  const[saved,setSaved]=useState(false);
  const taRef=useRef(),preRef=useRef(),lnRef=useRef();
  const code=codes[activeTab]||'';
  const setCode=v=>setCodes(p=>({...p,[activeTab]:v}));
  const highlighted=useMemo(()=>hl(code),[code]);
  const lc=code.split('\n').length;
  const fs=editorSize||12;
  const lh=fs*1.65;
  const sync=()=>{
    if(!taRef.current)return;
    const{scrollTop:st,scrollLeft:sl}=taRef.current;
    if(preRef.current){preRef.current.scrollTop=st;preRef.current.scrollLeft=sl;}
    if(lnRef.current)lnRef.current.scrollTop=st;
  };
  const onKeyDown=e=>{
    if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart;const v=code.substring(0,s)+'    '+code.substring(e.target.selectionEnd);setCode(v);requestAnimationFrame(()=>{if(taRef.current){taRef.current.selectionStart=taRef.current.selectionEnd=s+4;}});}
  };
  const run=()=>{setRunning(true);setOutput(null);setShowCons(true);setTimeout(()=>{setRunning(false);setOutput(OUTPUTS[activeTab]||{out:'Program exited successfully.',err:null,ms:'500ms',ok:true});},1500+Math.random()*400);};
  const save=()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const newFile=()=>{const nm=`New${tabs.length+1}.java`;const c=`public class New${tabs.length+1} {\n    public static void main(String[] args) {\n        \n    }\n}`;setTabs(p=>[...p,nm]);setCodes(p=>({...p,[nm]:c}));setActiveTab(nm);};
  const closeTab=t=>{const nt=tabs.filter(x=>x!==t);setTabs(nt);if(activeTab===t&&nt.length)setActiveTab(nt[Math.max(0,tabs.indexOf(t)-1)]);};
  const consH=consoleLayout==='sheet'?'42%':190;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#1e1e1e',position:'relative'}}>
      {/* toolbar */}
      <div className="tbar">
        <span style={{background:'rgba(240,165,0,.14)',color:'#f0a500',padding:'2px 8px',borderRadius:5,fontSize:11,fontWeight:600,fontFamily:'var(--code)'}}>☕ Java</span>
        <div style={{flex:1}}/>
        {[['undo','var(--tx2)'],['save',saved?'var(--ok)':'var(--tx2)'],['copy','var(--tx2)'],['share','var(--tx2)']].map(([ic,cl])=>(
          <div key={ic}onClick={ic==='save'?save:undefined}style={{width:28,height:28,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',background:ic==='save'&&saved?'rgba(63,185,80,.12)':'transparent'}}>
            <Ic n={ic}s={14}c={cl}/>
          </div>
        ))}
        <div onClick={()=>setShowDrw(true)}style={{width:28,height:28,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginLeft:2}}>
          <Ic n="folder"s={14}c="var(--tx2)"/>
        </div>
      </div>
      {/* tabs */}
      <div className="ftabs">
        {tabs.map(tab=>(
          <div key={tab}className={`ftab${activeTab===tab?' act':''}`}onClick={()=>setActiveTab(tab)}style={activeTab===tab?{borderBottomColor:ac}:{}}>
            <Ic n="file"s={10}c={activeTab===tab?ac:'#5a6270'}/>
            {tab}
            <span className="tabx"onClick={e=>{e.stopPropagation();closeTab(tab);}}>×</span>
          </div>
        ))}
        <div onClick={newFile}style={{display:'flex',alignItems:'center',padding:'0 12px',color:'#5a6270',cursor:'pointer',fontSize:18,lineHeight:1}}>+</div>
      </div>
      {/* editor */}
      <div className="ewrap"style={{flex:1}}>
        <div ref={lnRef}className="lnums"style={{fontSize:fs,lineHeight:`${lh}px`}}>
          {Array.from({length:lc},(_,i)=>(
            <div key={i}style={{height:lh,paddingRight:8,display:'flex',alignItems:'center',justifyContent:'flex-end'}}>{i+1}</div>
          ))}
        </div>
        <div className="carea">
          <pre ref={preRef}className="cpre"style={{fontSize:fs,lineHeight:`${lh}px`}}dangerouslySetInnerHTML={{__html:highlighted}}/>
          <textarea ref={taRef}className="cta"style={{fontSize:fs,lineHeight:`${lh}px`}}value={code}onChange={e=>setCode(e.target.value)}onScroll={sync}onKeyDown={onKeyDown}spellCheck={false}autoCapitalize="none"autoCorrect="off"/>
        </div>
      </div>
      {/* vscode status bar */}
      <div className="sbar">
        <span>☕ Java</span><span style={{opacity:.4}}>·</span>
        <span>Ln {lc}, Col 1</span><span style={{opacity:.4}}>·</span>
        <span>UTF-8</span>
        <div style={{flex:1}}/>
        {running&&<span className="spin"style={{fontSize:11}}>◌</span>}
        {!running&&output&&<span style={{color:output.ok?'#9cdcfe':'#f1917c'}}>{output.ok?'✓ Build succeeded':'✗ Build failed'} · {output.ms}</span>}
        <div onClick={()=>setShowCons(p=>!p)}style={{cursor:'pointer',display:'flex',alignItems:'center',gap:4,opacity:.85}}>
          <Ic n="term"s={11}c="#fff"/>Console
        </div>
      </div>
      {/* console */}
      {showCons&&(
        <div className="cons"style={{height:consH}}>
          <div className="chdr">
            {['output','problems'].map(t=>(
              <span key={t}className={`ctab${cTab===t?' act':''}`}onClick={()=>setCTab(t)}style={{color:cTab===t?ac:'var(--tx2)',textTransform:'capitalize'}}>{t}</span>
            ))}
            <div style={{flex:1}}/>
            <div onClick={run}style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',color:'var(--tx2)',fontSize:11}}>
              <Ic n="wrap"s={11}c="var(--tx2)"/>Clear
            </div>
            <div onClick={()=>setShowCons(false)}style={{cursor:'pointer',color:'var(--tx2)',marginLeft:6,display:'flex',alignItems:'center'}}>
              <Ic n="x"s={12}c="var(--tx2)"/>
            </div>
          </div>
          <div className="cbody">
            {running&&<div style={{color:'var(--tx2)',display:'flex',alignItems:'center',gap:8}}><span className="spin"style={{color:ac}}>◌</span>Compiling and running…</div>}
            {!running&&!output&&cTab==='output'&&<div style={{color:'#3c4555',fontStyle:'italic'}}>// Press ▶ Run to execute</div>}
            {!running&&output&&cTab==='output'&&<div style={{color:'#d4d4d4',whiteSpace:'pre-wrap'}}>{output.out}{output.err&&<span style={{color:'var(--er)',display:'block',marginTop:4}}>{output.err}</span>}</div>}
            {cTab==='problems'&&<div style={{display:'flex',alignItems:'center',gap:6,color:output?.err?'var(--er)':'var(--ok)'}}><Ic n={output?.err?'x':'chk'}s={12}c={output?.err?'var(--er)':'var(--ok)'}/>{output?.err?'1 error detected':'No problems'}</div>}
          </div>
        </div>
      )}
      {/* run button */}
      <button className="runbtn"onClick={run}disabled={running}style={{background:running?'#2a2a2a':ac,color:running?'#555':'#000',boxShadow:running?'none':`0 4px 20px ${ac}44`}}>
        {running?<><span className="spin">◌</span>Running…</>:<><Ic n="play"s={12}c="#000"/>Run</>}
      </button>
      {/* drawer */}
      {showDrw&&(
        <div className="dov"onClick={()=>setShowDrw(false)}>
          <div className="drw"onClick={e=>e.stopPropagation()}>
            <div style={{padding:'13px 16px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>Explorer</span>
              <div onClick={()=>setShowDrw(false)}style={{cursor:'pointer'}}><Ic n="x"s={14}c="var(--tx2)"/></div>
            </div>
            <div style={{padding:12,flex:1,overflowY:'auto'}}>

// ── STUDY ────────────────────────────────────────────────────
function StudyScreen({ac}){
  const[view,setView]=useState('packs');
  const[pack,setPack]=useState(null);
  const[lesson,setLesson]=useState(null);
  const[lCodes,setLCodes]=useState({});
  const[running,setRunning]=useState(false);
  const[out,setOut]=useState(null);
  const[passed,setPassed]=useState({});
  const taRef=useRef(),preRef=useRef(),lnRef=useRef();

  if(view==='lesson'&&lesson){
    const code=lCodes[lesson.id]??lesson.starter;
    const setCode=v=>setLCodes(p=>({...p,[lesson.id]:v}));
    const highlighted=useMemo(()=>hl(code),[code]);
    const lc=code.split('\n').length;
    const fs=12;const lh=fs*1.65;
    const sync=()=>{if(!taRef.current)return;const{scrollTop:st,scrollLeft:sl}=taRef.current;if(preRef.current){preRef.current.scrollTop=st;preRef.current.scrollLeft=sl;}if(lnRef.current)lnRef.current.scrollTop=st;};
    const onKeyDown=e=>{if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart;const v=code.substring(0,s)+'    '+code.substring(e.target.selectionEnd);setCode(v);requestAnimationFrame(()=>{if(taRef.current){taRef.current.selectionStart=taRef.current.selectionEnd=s+4;}});}};
    const runCode=()=>{setRunning(true);setOut(null);setTimeout(()=>{setRunning(false);setOut({txt:'Program ran successfully.',ok:true});},1300+Math.random()*400);};
    const submit=()=>{setRunning(true);setOut(null);setTimeout(()=>{setRunning(false);setOut({txt:'✓ All test cases passed! (3/3)',ok:true});setPassed(p=>({...p,[lesson.id]:true}));},1800+Math.random()*400);};
    const isDone=passed[lesson.id]||lesson.done;
    const lessons=LESSONS[pack.id]||[];
    const idx=lessons.indexOf(lesson);
    return(
      <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#1e1e1e'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#252526',borderBottom:'1px solid #3c3c3c',flexShrink:0}}>
          <div onClick={()=>{setView('lessons');setOut(null);}}style={{cursor:'pointer'}}><Ic n="back"s={18}c="var(--tx2)"/></div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>{lesson.name}</div>
            <div style={{fontSize:11,color:'var(--tx2)'}}>{pack.name} · {idx+1}/{lessons.length}</div>
          </div>
          {isDone&&<span style={{background:'rgba(63,185,80,.15)',color:'var(--ok)',padding:'3px 8px',borderRadius:6,fontSize:11,fontWeight:600}}>✓ Done</span>}
        </div>
        {/* theory */}
        <div style={{padding:'12px 14px',background:'var(--bg)',borderBottom:'1px solid var(--bd)',flexShrink:0,maxHeight:150,overflowY:'auto'}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:6,letterSpacing:'.07em',textTransform:'uppercase'}}>Theory</div>
          <div style={{fontSize:12.5,color:'var(--tx)',lineHeight:1.65,whiteSpace:'pre-wrap'}}>{lesson.theory}</div>
        </div>
        <div style={{fontSize:10,padding:'5px 12px',background:'#252526',borderBottom:'1px solid #3c3c3c',color:'#5a6270',flexShrink:0,fontFamily:'var(--code)',letterSpacing:'.05em',textTransform:'uppercase',fontWeight:600}}>Your solution</div>
        <div className="ewrap"style={{flex:1}}>
          <div ref={lnRef}className="lnums"style={{fontSize:fs,lineHeight:`${lh}px`,overflowY:'hidden'}}>
            {Array.from({length:lc},(_,i)=><div key={i}style={{height:lh,paddingRight:8,display:'flex',alignItems:'center',justifyContent:'flex-end'}}>{i+1}</div>)}
          </div>
          <div className="carea">
            <pre ref={preRef}className="cpre"style={{fontSize:fs,lineHeight:`${lh}px`}}dangerouslySetInnerHTML={{__html:highlighted}}/>
            <textarea ref={taRef}className="cta"style={{fontSize:fs,lineHeight:`${lh}px`}}value={code}onChange={e=>setCode(e.target.value)}onScroll={sync}onKeyDown={onKeyDown}spellCheck={false}autoCapitalize="none"autoCorrect="off"/>
          </div>
        </div>
        {out&&<div style={{padding:'9px 12px',background:'#141414',borderTop:'1px solid #3c3c3c',flexShrink:0,fontFamily:'var(--code)',fontSize:11.5,color:out.ok?'var(--ok)':'var(--er)',whiteSpace:'pre-wrap'}}>{out.txt}</div>}
        <div style={{display:'flex',gap:10,padding:'11px 12px',background:'#252526',borderTop:'1px solid #3c3c3c',flexShrink:0}}>
          <button onClick={runCode}disabled={running}className="btn bg"style={{flex:1,fontSize:13,gap:6}}>
            {running?<span className="spin">◌</span>:<Ic n="play"s={13}c={ac}/>}{running?'Running…':'Run'}
          </button>
          <button onClick={submit}disabled={running||isDone}className="btn bp"style={{flex:1,fontSize:13,background:isDone?'var(--ok)':ac,color:'#000'}}>
            {isDone?<><Ic n="chk"s={13}c="#000"/>Passed</>:'Submit'}
          </button>
        </div>
      </div>
    );
  }

  if(view==='lessons'&&pack){
    const lessons=LESSONS[pack.id]||[];
    return(
      <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
        <div style={{padding:'13px 16px',background:'var(--s1)',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div onClick={()=>setView('packs')}style={{cursor:'pointer'}}><Ic n="back"s={20}c="var(--tx2)"/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:700,color:'var(--tx)'}}>{pack.name}</div>
              <div style={{fontSize:12,color:'var(--tx2)',marginTop:1}}>{pack.tag} · {lessons.length} lessons</div>
            </div>
          </div>
          <div className="pbar"><div className="pfill"style={{width:`${(pack.done/pack.lessons)*100}%`}}/></div>
          <div style={{fontSize:11,color:'var(--tx2)',marginTop:5}}>{pack.done}/{pack.lessons} completed</div>
        </div>
        <div className="scr"style={{flex:1,padding:'12px 16px'}}>
          {lessons.map((ls,i)=>{
            const done=passed[ls.id]||ls.done;
            return(
              <div key={ls.id}onClick={()=>{setLesson(ls);setView('lesson');setOut(null);}}style={{display:'flex',alignItems:'center',gap:12,padding:'11px 12px',background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:12,marginBottom:8,cursor:'pointer'}}>
                <div style={{width:32,height:32,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',background:done?`${ac}1a`:'var(--s2)',flexShrink:0}}>
                  {done?<Ic n="chk"s={14}c={ac}/>:<span style={{fontSize:12,fontWeight:600,color:'var(--tx2)'}}>{i+1}</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--tx)',marginBottom:2}}>{ls.name}</div>
                  <div style={{fontSize:11,color:'var(--tx2)'}}>{done?'Completed':'Not started'}</div>
                </div>
                <Ic n="chev"s={13}c="var(--tx2)"/>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{padding:'16px',background:'var(--s1)',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
        <div style={{fontSize:18,fontWeight:700,color:'var(--tx)'}}>Study Mode</div>
        <div style={{fontSize:12,color:'var(--tx2)',marginTop:2}}>Structured lesson packs</div>
      </div>
      <div className="scr"style={{flex:1,padding:'16px'}}>
        {PACKS.map(p=>(
          <div key={p.id}onClick={()=>{if(!p.free)return;setPack(p);setView('lessons');}}style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:14,padding:'14px',marginBottom:12,cursor:p.free?'pointer':'default',opacity:p.free?1:.65}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:p.done>0?12:0}}>
              <div style={{width:40,height:40,borderRadius:10,background:`${p.color}1a`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <Ic n="book"s={18}c={p.color}/>
              </div>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                  <span style={{fontSize:14,fontWeight:700,color:'var(--tx)'}}>{p.name}</span>
                  {!p.free&&<Ic n="lock"s={12}c="var(--tx2)"/>}
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <span className="badge"style={{background:`${p.color}1a`,color:p.color}}>{p.tag}</span>
                  <span className="badge"style={{background:'var(--s2)',color:'var(--tx2)'}}>{p.lessons} lessons</span>
                  <span className="badge"style={{background:'var(--s2)',color:'var(--tx2)'}}>{p.size}</span>
                </div>
              </div>
              <span style={{background:p.free?'rgba(63,185,80,.12)':'rgba(240,165,0,.12)',color:p.free?'var(--ok)':'#f0a500',padding:'2px 8px',borderRadius:5,fontSize:11,fontWeight:600,flexShrink:0}}>{p.free?'Free':'Premium'}</span>
            </div>
            {p.done>0&&(
              <>
                <div className="pbar"><div className="pfill"style={{width:`${(p.done/p.lessons)*100}%`}}/></div>
                <div style={{fontSize:11,color:'var(--tx2)',marginTop:5}}>{p.done}/{p.lessons} completed</div>
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

            </div>
          </div>
          <Row lb="Default language" right={<span style={{fontSize:13,color:ac,fontWeight:600}}>Java</span>}border={false}/>
        </div>
        <div className="card">
          <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:2,letterSpacing:'.07em',textTransform:'uppercase'}}>Notifications</div>
          <Row lb="Push notifications" right={<Toggle v={notifs}onChange={setNotifs}/>}border={false}/>
        </div>
      </div>
    </div>
  );
}

// ── TWEAKS ───────────────────────────────────────────────────
function TweaksPanel({tw,setTw,show}){
  if(!show)return null;
  return(
    <div style={{position:'fixed',bottom:24,right:24,background:'#0d1117',border:'1px solid #30363d',borderRadius:16,padding:'16px',width:230,zIndex:2000,boxShadow:'0 12px 40px rgba(0,0,0,.7)',fontFamily:'Inter'}}>
      <div style={{fontSize:13,fontWeight:700,color:'#e6edf3',marginBottom:14}}>Tweaks</div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:'#7d8590',marginBottom:8,textTransform:'uppercase',letterSpacing:'.07em',fontWeight:600}}>Accent Color</div>
        <div style={{display:'flex',gap:8}}>
          {['#00e5ff','#569cd6','#4ec9b0','#c792ea','#ce9178'].map(c=>(
            <div key={c}onClick={()=>setTw(p=>({...p,accent:c}))}style={{width:26,height:26,borderRadius:'50%',background:c,cursor:'pointer',border:tw.accent===c?'3px solid white':'3px solid transparent',outline:tw.accent===c?`2px solid ${c}`:'none',outlineOffset:2}}/>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:'#7d8590',marginBottom:8,textTransform:'uppercase',letterSpacing:'.07em',fontWeight:600}}>Editor Font: {tw.editorSize}px</div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div onClick={()=>setTw(p=>({...p,editorSize:Math.max(10,p.editorSize-1)}))}style={{width:26,height:26,borderRadius:6,background:'#21262d',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#e6edf3',fontSize:16,lineHeight:1}}>−</div>
          <div style={{flex:1,height:4,background:'#21262d',borderRadius:2}}><div style={{height:'100%',background:tw.accent,borderRadius:2,width:`${((tw.editorSize-10)/12)*100}%`}}/></div>
          <div onClick={()=>setTw(p=>({...p,editorSize:Math.min(22,p.editorSize+1)}))}style={{width:26,height:26,borderRadius:6,background:'#21262d',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#e6edf3',fontSize:16,lineHeight:1}}>+</div>
        </div>
      </div>
      <div>
        <div style={{fontSize:10,color:'#7d8590',marginBottom:8,textTransform:'uppercase',letterSpacing:'.07em',fontWeight:600}}>Console Layout</div>
        <div style={{display:'flex',gap:6}}>
          {['split','sheet'].map(l=>(
            <div key={l}onClick={()=>setTw(p=>({...p,consoleLayout:l}))}style={{flex:1,padding:'6px',borderRadius:8,background:tw.consoleLayout===l?`${tw.accent}16`:'#21262d',border:`1px solid ${tw.consoleLayout===l?tw.accent:'#30363d'}`,color:tw.consoleLayout===l?tw.accent:'#7d8590',fontSize:11,textAlign:'center',cursor:'pointer',fontWeight:600,textTransform:'capitalize'}}>{l}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────
function App(){
  const[sc,setSc]=useState(()=>localStorage.getItem('ca_sc')||'home');
  const[tw,setTw]=useState(()=>{try{return JSON.parse(localStorage.getItem('ca_tw'))||TWEAK_DEFAULTS;}catch{return TWEAK_DEFAULTS;}});
  const[showTw,setShowTw]=useState(false);
  const prevSc=useRef(sc);

  useEffect(()=>{localStorage.setItem('ca_sc',sc);},[sc]);
  useEffect(()=>{
    localStorage.setItem('ca_tw',JSON.stringify(tw));
    document.documentElement.style.setProperty('--ac',tw.accent);
    document.documentElement.style.setProperty('--ac2',tw.accent+'22');
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:tw},'*');
  },[tw]);
  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')setShowTw(true);
      if(e.data?.type==='__deactivate_edit_mode')setShowTw(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const noNav=['settings'];
  const sp={setSc,ac:tw.accent,editorSize:tw.editorSize,consoleLayout:tw.consoleLayout};

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#0a0a0a',padding:'20px'}}>
      <div className="phone">
        <div className="di"/>
        <div className="screen">
          <StatusBar/>
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}}className="fu"key={sc}>
            {sc==='home'&&<HomeScreen {...sp}/>}
            {sc==='code'&&<CodeScreen {...sp}/>}
            {sc==='study'&&<StudyScreen {...sp}/>}
            {sc==='market'&&<MarketScreen {...sp}/>}
            {sc==='profile'&&<ProfileScreen {...sp}/>}
            {sc==='settings'&&<SettingsScreen goBack={()=>setSc('profile')}ac={tw.accent}/>}
          </div>
          {!noNav.includes(sc)&&<BottomNav sc={sc}setSc={setSc}ac={tw.accent}/>}
        </div>
      </div>
      <TweaksPanel tw={tw}setTw={setTw}show={showTw}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
